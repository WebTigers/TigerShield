; TigerShield module ACL — security configuration is admin-and-above.
;
; The FIREWALL GATE itself is a front-controller plugin (registered in Bootstrap.php), NOT a
; controller/service — it runs for everyone, before the ACL, and needs no rule here. Only the ADMIN
; surface (settings + live-traffic) and its /api services are ACL resources.
[production]

acl.resources.tigershield_admin_ctrl.resource    = "Tigershield_AdminController"
acl.resources.tigershield_settings_svc.resource  = "Tigershield_Service_Settings"
acl.resources.tigershield_events_svc.resource    = "Tigershield_Service_Events"
acl.resources.tigershield_rules_svc.resource     = "Tigershield_Service_Rules"

acl.rules.tigershield_admin.role       = "admin"
acl.rules.tigershield_admin.resource   = "Tigershield_AdminController"
acl.rules.tigershield_admin.permission = "allow"

acl.rules.tigershield_settings_svc.role       = "admin"
acl.rules.tigershield_settings_svc.resource   = "Tigershield_Service_Settings"
acl.rules.tigershield_settings_svc.permission = "allow"

acl.rules.tigershield_events_svc.role       = "admin"
acl.rules.tigershield_events_svc.resource   = "Tigershield_Service_Events"
acl.rules.tigershield_events_svc.permission = "allow"

acl.rules.tigershield_rules_svc.role       = "admin"
acl.rules.tigershield_rules_svc.resource   = "Tigershield_Service_Rules"
acl.rules.tigershield_rules_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
