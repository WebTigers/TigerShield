; TigerShield defaults. These are the BASE config; an admin overrides them live via the config table
; (tiger.tigershield.*), per-org capable, no deploy (config-discipline). Ships in LEARN mode so a fresh
; install logs but never blocks a real visitor until the operator has watched traffic (FEATURES.md §0).
[production]

tiger.tigershield.enabled = "1"
tiger.tigershield.mode    = "learn"          ; off | learn | enforce

; Rate limiting (fixed-window; hot counters live in APCu, NOT the config table).
tiger.tigershield.ratelimit.enabled              = "1"
; Login protection (audit-log based — works on any host, no cache needed):
tiger.tigershield.ratelimit.login.max            = "10"    ; failed sign-ins / window / IP
tiger.tigershield.ratelimit.login.identifier_max = "20"    ; failed sign-ins / window / account
tiger.tigershield.ratelimit.login.window         = "300"
tiger.tigershield.ratelimit.login.action         = "block" ; block | captcha
; General per-request rate limit (needs APCu; a graceful no-op without it):
tiger.tigershield.ratelimit.request.max          = "300"   ; requests / window / IP
tiger.tigershield.ratelimit.request.window       = "60"

; CrowdSec (built-in lightweight CAPI client — no SDK). Machine credentials are minted on demand and
; stored ENCRYPTED in the config tier (Tiger_Crypto); nothing secret is set here.
tiger.tigershield.crowdsec.enabled    = "0"
tiger.tigershield.crowdsec.refresh    = "900"                        ; seconds between blocklist refreshes (min 300)
tiger.tigershield.crowdsec.capi_url   = "https://api.crowdsec.net/v3" ; the CAPI base (rarely changed)
tiger.tigershield.crowdsec.scenarios  = ""                          ; optional comma list sent at login
tiger.tigershield.crowdsec.contribute = "0"                         ; opt-in: push our own detections back (POST /signals)

; Captcha gating (§6). A 'captcha' verdict (CrowdSec captcha remediation, or login.action=captcha)
; shows an interstitial instead of a flat block; a pass sets a signed, IP-bound clearance cookie. Uses
; Tiger's reCAPTCHA (tiger.recaptcha.* — site key public, secret in local.ini). No provider configured →
; a 'captcha' verdict falls back per captcha.fallback.
tiger.tigershield.captcha.window   = "3600"  ; seconds a solved browser is trusted for its IP
tiger.tigershield.captcha.fallback = "allow" ; allow | block — when no captcha provider is configured

; Request WAF — ships log-only so it never false-positives a real site on day one. waf.action is the
; action for HIGH-confidence matches; the soft SQLi/XSS heuristics are always log-only. Each rule
; category is a live on/off toggle (waf.cat.*), all on by default.
tiger.tigershield.waf.enabled = "1"
tiger.tigershield.waf.action  = "log"        ; log | captcha | block (high-confidence categories)
tiger.tigershield.waf.cat.files     = "1"    ; sensitive-file / secret probes
tiger.tigershield.waf.cat.cms       = "1"    ; WordPress / common-CMS probes
tiger.tigershield.waf.cat.traversal = "1"    ; path traversal / LFI
tiger.tigershield.waf.cat.rce       = "1"    ; command / code injection
tiger.tigershield.waf.cat.nullbyte  = "1"    ; null bytes / control chars
tiger.tigershield.waf.cat.method    = "1"    ; disallowed HTTP methods
tiger.tigershield.waf.cat.scanners  = "1"    ; known scanner user-agents
tiger.tigershield.waf.cat.sqli      = "1"    ; SQL injection heuristics (soft — log-only)
tiger.tigershield.waf.cat.xss       = "1"    ; XSS heuristics (soft — log-only)

[staging : production]

[testing : production]

[development : production]
