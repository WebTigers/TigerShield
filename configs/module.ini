; TigerShield defaults. These are the BASE config; an admin overrides them live via the config table
; (tiger.tigershield.*), per-org capable, no deploy (config-discipline). Ships in LEARN mode so a fresh
; install logs but never blocks a real visitor until the operator has watched traffic (FEATURES.md §0).
[production]

tiger.tigershield.enabled = "1"
tiger.tigershield.mode    = "learn"          ; off | learn | enforce

; Rate limiting (fixed-window; hot counters live in APCu, NOT the config table).
tiger.tigershield.ratelimit.enabled              = "1"
; Login protection (audit-log based — works on any host, no cache needed):
tiger.tigershield.ratelimit.login.max            = "10"    ; failed sign-ins / window / IP
tiger.tigershield.ratelimit.login.identifier_max = "20"    ; failed sign-ins / window / account
tiger.tigershield.ratelimit.login.window         = "300"
tiger.tigershield.ratelimit.login.action         = "block" ; block | captcha (captcha lands phase 4)
; General per-request rate limit (needs APCu; a graceful no-op without it):
tiger.tigershield.ratelimit.request.max          = "300"   ; requests / window / IP
tiger.tigershield.ratelimit.request.window       = "60"

; CrowdSec (built-in lightweight CAPI client; enroll key is a local.ini SECRET, not here).
tiger.tigershield.crowdsec.enabled = "0"
tiger.tigershield.crowdsec.refresh = "900"   ; seconds between blocklist refreshes

; Request WAF — ships log-only so it never false-positives a real site on day one.
tiger.tigershield.waf.enabled = "1"
tiger.tigershield.waf.action  = "log"        ; log | captcha | block

